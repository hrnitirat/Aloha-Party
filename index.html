<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aloha Thank You Party - Virtual Photobooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{--gold:#FFD700}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow-x:hidden}
  body{font-family:'Sarabun','Georgia',serif;-webkit-font-smoothing:antialiased;background:#E85D26}

  .screen{display:none;width:100%;min-height:100vh;min-height:100dvh;flex-direction:column;align-items:center;position:relative;overflow:hidden}
  .screen.active{display:flex}
  .screen-inner{width:100%;max-width:460px;padding:20px 16px;display:flex;flex-direction:column;align-items:center;position:relative;z-index:2}
  .screen::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1}

  .bg-tropical{background:linear-gradient(160deg,#FFB347 0%,#FF6B35 35%,#E85D26 70%,#D44E1C 100%)}

  .deco-layer{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .deco-item{position:absolute;will-change:transform}

  @keyframes fadeSlideDown{from{opacity:0;transform:translateY(-36px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeSlideUp{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}
  @keyframes gentleFloat{0%,100%{transform:translateY(0) rotate(var(--r,0deg))}50%{transform:translateY(var(--fy,-12px)) rotate(calc(var(--r,0deg)+8deg))}}
  @keyframes countPulse{0%{transform:scale(.2);opacity:0}50%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:1}}
  @keyframes flashBang{0%{opacity:1}100%{opacity:0}}
  @keyframes popIn{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes breathe{0%,100%{box-shadow:0 4px 20px rgba(0,0,0,.25),0 0 0 0 rgba(255,215,0,.4)}50%{box-shadow:0 4px 28px rgba(0,0,0,.3),0 0 0 10px rgba(255,215,0,0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes postcardFlip{0%{opacity:0;transform:perspective(1000px) rotateY(80deg) scale(.6)}50%{opacity:1;transform:perspective(1000px) rotateY(-8deg) scale(1.02)}100%{transform:perspective(1000px) rotateY(0) scale(1)}}
  @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}

  .title-aloha{font-family:'Pacifico',cursive;font-size:clamp(48px,12vw,64px);color:#FFF;text-shadow:3px 4px 8px rgba(0,0,0,.25),0 0 40px rgba(255,165,0,.2);line-height:1}
  .title-sub{font-size:clamp(16px,4.5vw,22px);color:#FFF9C4;text-transform:uppercase;letter-spacing:6px;font-weight:800;text-shadow:1px 2px 4px rgba(0,0,0,.2)}

  .btn-primary{background:rgba(255,255,255,.95);color:#E85D26;border:none;border-radius:60px;padding:18px 52px;font-size:19px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,.18),inset 0 -2px 0 rgba(0,0,0,.06);letter-spacing:.5px;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
  .btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,.4) 50%,transparent 70%);background-size:200% 100%;animation:shimmer 3s ease-in-out infinite}
  .btn-primary:hover,.btn-primary:active{transform:scale(1.04);box-shadow:0 12px 40px rgba(0,0,0,.25)}

  .btn-ghost{background:transparent;border:2px solid rgba(255,255,255,.35);border-radius:50px;padding:11px 32px;color:#FFF;font-size:14px;font-family:'Sarabun',sans-serif;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
  .btn-ghost:hover{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.08)}

  .btn-gold{width:100%;max-width:280px;padding:15px 24px;background:linear-gradient(135deg,#FFD700,#FFC107);color:#5D4037;border:none;border-radius:50px;font-size:16px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(255,193,7,.4);transition:transform .2s}
  .btn-gold:hover{transform:scale(1.03)}
  .btn-cancel{margin-top:16px;background:transparent;border:none;color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;padding:8px 16px;font-family:'Sarabun',sans-serif;transition:color .2s}
  .btn-cancel:hover{color:rgba(255,255,255,.85)}

  .tpl-card{width:100%;border:2.5px solid rgba(255,255,255,.25);border-radius:18px;padding:0;cursor:pointer;overflow:hidden;transition:all .25s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 24px rgba(0,0,0,.15);text-align:left;font-family:'Sarabun',sans-serif;position:relative}
  .tpl-card::after{content:'→';position:absolute;right:20px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.5);font-size:22px;transition:all .25s}
  .tpl-card:hover{transform:translateY(-2px) scale(1.015);border-color:rgba(255,255,255,.6);box-shadow:0 8px 32px rgba(0,0,0,.25)}
  .tpl-card:hover::after{right:16px;color:rgba(255,255,255,.8)}
  .tpl-card:active{transform:scale(.98)}
  .tpl-inner{padding:18px 50px 18px 20px;display:flex;align-items:center;gap:16px}
  .tpl-preview{width:60px;height:180px;border-radius:8px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .tpl-preview img{width:100%;height:100%;object-fit:cover}
  .tpl-name{color:#FFF;font-size:17px;font-weight:700;margin-bottom:3px;text-shadow:1px 1px 3px rgba(0,0,0,.25)}
  .tpl-desc{color:rgba(255,255,255,.75);font-size:13px}

  .cam-box{position:relative;width:100%;max-width:400px;aspect-ratio:4/3;border-radius:18px;overflow:hidden;box-shadow:0 8px 36px rgba(0,0,0,.3);background:#111;border:4px solid var(--gold)}
  .cam-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  .cam-overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:10}
  .cam-overlay.on{display:flex}
  .countdown-bg{background:rgba(0,0,0,.45);backdrop-filter:blur(2px)}
  .countdown-num{font-size:min(120px,25vw);font-weight:900;color:var(--gold);text-shadow:0 0 60px rgba(255,215,0,.5),0 4px 12px rgba(0,0,0,.3)}
  .flash-bg{background:#FFF;z-index:20}
  .error-bg{background:rgba(0,0,0,.85);padding:24px;text-align:center;color:#FFF;font-size:15px}

  .shutter-btn{margin-top:28px;width:78px;height:78px;border-radius:50%;background:#FFF;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;animation:breathe 2.5s ease-in-out infinite;border:none;position:relative}
  .shutter-btn::before{content:'';position:absolute;width:88px;height:88px;border-radius:50%;border:3px solid rgba(255,255,255,.5)}
  .shutter-btn-inner{width:58px;height:58px;border-radius:50%;background:#FF6B35}
  .shutter-btn:hover{transform:scale(1.08)}
  .shutter-btn:active{transform:scale(.95)}

  .dot-row{display:flex;gap:8px;margin-bottom:18px}
  .dot{height:10px;border-radius:5px;transition:all .4s cubic-bezier(.4,0,.2,1)}
  .dot.done{width:36px;background:var(--gold)}.dot.current{width:14px;background:rgba(255,215,0,.5)}.dot.pending{width:10px;background:rgba(255,255,255,.25)}

  .thumb-row{display:flex;gap:8px;margin-top:18px;min-height:58px}
  .thumb{width:74px;height:56px;border-radius:8px;overflow:hidden;animation:popIn .35s ease-out;border:2px solid var(--gold)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .thumb-empty{width:74px;height:56px;border-radius:8px;border:2px dashed rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);font-size:13px;font-weight:600}

  .strip-preview{width:100%;max-width:220px;margin:0 auto;aspect-ratio:600/1800;border-radius:14px;overflow:hidden;box-shadow:0 16px 56px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.1)}
  .strip-preview img{width:100%;height:100%;object-fit:cover}
  .glass-card{margin-top:24px;padding:22px 24px;background:rgba(255,255,255,.1);border-radius:18px;text-align:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);width:100%}
  .qr-wrapper{display:inline-block;background:#FFF;padding:14px;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.2)}

  @media(max-width:380px){.screen-inner{padding:16px 12px}.btn-primary{padding:16px 40px;font-size:17px}}
</style>
</head>
<body>

<!-- ════════ START ════════ -->
<div id="screen-start" class="screen active bg-tropical">
  <div class="deco-layer" id="start-deco"></div>
  <div class="screen-inner" style="padding-top:0">
    <div style="margin-top:clamp(40px,10vh,80px);text-align:center;animation:fadeSlideDown .8s ease-out">
      <div style="font-size:68px;margin-bottom:4px;filter:drop-shadow(0 6px 16px rgba(0,0,0,.25))">🗿</div>
      <h1 class="title-aloha">Aloha</h1>
      <h2 class="title-sub" style="margin-top:6px">Thank You Party</h2>
      <div style="margin-top:28px">
        <p style="color:rgba(255,255,255,.9);font-size:16px;font-weight:600">Virtual Photobooth</p>
        <p style="color:rgba(255,255,255,.6);font-size:13px;margin-top:4px">3 April 2026 • WanDeeDee Cafe x Restaurant</p>
      </div>
    </div>
    <div style="margin-top:clamp(32px,6vh,52px);animation:fadeSlideUp .9s ease-out .2s both">
      <button class="btn-primary" onclick="go('select')">📸 เริ่มถ่ายรูป</button>
    </div>
    <div style="margin-top:36px;display:flex;gap:14px;font-size:26px;opacity:.5;animation:fadeSlideUp 1s ease-out .5s both">
      <span>🌴</span><span>🌺</span><span>🍍</span><span>🌊</span><span>🌴</span>
    </div>
  </div>
</div>

<!-- ════════ SELECT ════════ -->
<div id="screen-select" class="screen bg-tropical">
  <div class="deco-layer"></div>
  <div class="screen-inner">
    <div style="text-align:center;margin-top:28px;animation:fadeSlideDown .6s ease-out">
      <h2 style="color:#FFF;font-size:22px;font-weight:800;text-shadow:2px 2px 6px rgba(0,0,0,.2)">🎨 เลือก Template</h2>
      <p style="color:rgba(255,255,255,.7);font-size:13px;margin-top:6px">เลือกธีมสำหรับ Photo Strip ของคุณ</p>
    </div>
    <div id="tpl-list" style="display:flex;flex-direction:column;gap:14px;width:100%;margin-top:24px"></div>
    <button class="btn-ghost" style="margin-top:28px" onclick="go('start')">← กลับ</button>
  </div>
</div>

<!-- ════════ CAMERA ════════ -->
<div id="screen-camera" class="screen bg-tropical">
  <div class="deco-layer"></div>
  <div class="screen-inner">
    <div id="shot-label" style="color:#FFF;font-size:13px;margin:18px 0 10px;text-transform:uppercase;letter-spacing:3px;opacity:.75;font-weight:600"></div>
    <div id="dot-row" class="dot-row"></div>
    <div class="cam-box" id="cam-box">
      <video id="video" autoplay playsinline muted></video>
      <div id="cd-layer" class="cam-overlay countdown-bg"><div id="cd-num" class="countdown-num"></div></div>
      <div id="fl-layer" class="cam-overlay flash-bg"></div>
      <div id="err-layer" class="cam-overlay error-bg"></div>
    </div>
    <canvas id="cap-canvas" style="display:none"></canvas>
    <div id="thumb-row" class="thumb-row"></div>
    <button id="shutter" class="shutter-btn" onclick="doCountdown()"><div class="shutter-btn-inner"></div></button>
    <button class="btn-cancel" onclick="resetAll()">ยกเลิก</button>
  </div>
</div>

<!-- ════════ REVIEW ════════ -->
<div id="screen-review" class="screen bg-tropical">
  <div class="deco-layer"></div>
  <div class="screen-inner" style="max-width:400px">
    <div id="rv-load" style="margin-top:clamp(60px,15vh,100px);text-align:center;animation:fadeSlideUp .5s ease-out">
      <div style="font-size:52px;margin-bottom:16px;animation:spin 2s linear infinite">🌺</div>
      <p style="color:#FFF;font-size:17px;font-weight:600">กำลังสร้าง Photo Strip...</p>
    </div>
    <div id="rv-result" style="display:none;width:100%">
      <h2 style="color:#FFF;font-size:20px;text-align:center;margin:24px 0 20px;text-shadow:2px 2px 6px rgba(0,0,0,.25);font-weight:800">🎉 Photo Strip ของคุณ!</h2>
      <div class="strip-preview" id="strip-box"></div>
      <div class="glass-card">
        <p style="color:var(--gold);font-size:17px;font-weight:800;margin-bottom:6px">Aloha Thank You Party</p>
        <p style="color:rgba(255,255,255,.85);font-size:14px;line-height:1.7">ขอขอบคุณสำหรับความทุ่มเทในไตรมาสที่ผ่านมา</p>
      </div>
      <div style="margin-top:24px;display:flex;flex-direction:column;gap:12px;align-items:center">
        <button class="btn-gold" onclick="dlStrip()">💾 ดาวน์โหลด Photo Strip</button>
        <button class="btn-gold" style="background:linear-gradient(135deg,#4FC3F7,#039BE5);color:#FFF;box-shadow:0 4px 20px rgba(3,155,229,.4)" onclick="shareStrip()">📤 แชร์รูป</button>
      </div>
      <div id="qr-area" class="glass-card" style="margin-top:20px">
        <div id="qr-status"></div>
      </div>
      <div style="text-align:center;margin-top:24px;padding-bottom:36px">
        <button class="btn-ghost" onclick="resetAll()">🔄 ถ่ายใหม่</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════ CONFIG ═══════════ */
const FW = 600, FH = 1800;

// ⚠️ Google Apps Script URL
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwu4oxsJKJ64r9OQHUseFaMken-xIJsFl4ORu89HPlTyd9kbzYAdl0SxSFOwKyXO3FTmg/exec';

let driveUrl = null;

/* ═══════════ TEMPLATES ═══════════ */
const TEMPLATES = [
  {
    id: 1,
    name: "Aloha Beach",
    desc: "ชายหาดและสัตว์ทะเล",
    src: "frame_aloha.png",
    bgCSS: "linear-gradient(160deg,#5BA3D9 0%,#F2C078 50%,#D4A05A 100%)",
    slots: [
      { x:139, y:218, w:329, h:380 },
      { x:123, y:674, w:350, h:357 },
      { x:176, y:1096, w:258, h:353 },
    ],
    imgObj: null,
  },
  {
    id: 2,
    name: "Summer Holiday",
    desc: "กระดาษฉีกสไตล์ซัมเมอร์",
    src: "frame_summer.png",
    bgCSS: "linear-gradient(160deg,#FCEABB 0%,#F8B500 50%,#F09819 100%)",
    slots: [
      { x:64, y:295, w:471, h:337 },
      { x:64, y:714, w:471, h:336 },
      { x:65, y:1113, w:470, h:337 },
    ],
    imgObj: null,
  },
];

let S = { tpl:null, pics:[], stream:null, comp:null };

/* ═══════════ INIT ═══════════ */
document.addEventListener("DOMContentLoaded", () => {
  // Floating flowers
  const layer = document.getElementById("start-deco");
  ['🌺','🌸','🌼','🏵️','🌺','🌺','🌸','🌺'].forEach((e,i) => {
    const d = document.createElement("div");
    d.className = "deco-item"; d.textContent = e;
    d.style.cssText = `left:${8+(i*13)%82}%;top:${4+(i*15)%68}%;font-size:${18+(i%3)*10}px;opacity:${.08+(i%4)*.04};--r:${i*40}deg;--fy:${-8-(i%3)*6}px;animation:gentleFloat ${3.5+i%3}s ease-in-out ${i*.3}s infinite`;
    layer.appendChild(d);
  });

  // Preload frames
  TEMPLATES.forEach(t => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = t.src;
    img.onload = () => { t.imgObj = img; console.log("Frame loaded:", t.src); };
    img.onerror = () => console.error("Frame failed:", t.src);
  });

  // Template cards
  const list = document.getElementById("tpl-list");
  TEMPLATES.forEach((t, i) => {
    const card = document.createElement("button");
    card.className = "tpl-card";
    card.style.background = t.bgCSS;
    card.style.animation = `fadeSlideUp .5s ease-out ${.1+i*.12}s both`;
    card.onclick = () => pickTpl(t);
    card.innerHTML = `<div class="tpl-inner">
      <div class="tpl-preview"><img src="${t.src}" alt="${t.name}"></div>
      <div><div class="tpl-name">${t.name}</div><div class="tpl-desc">${t.desc}</div></div>
    </div>`;
    list.appendChild(card);
  });
});

/* ═══════════ NAV ═══════════ */
function go(n) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + n).classList.add("active");
  window.scrollTo(0, 0);
}

function pickTpl(t) {
  S.tpl = t; S.pics = [];
  go("camera"); updCam();
  setTimeout(startCam, 250);
}

/* ═══════════ CAMERA ═══════════ */
async function startCam() {
  const er = document.getElementById("err-layer"); er.classList.remove("on");
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:"user", width:{ideal:1280}, height:{ideal:960} }, audio: false
    });
    S.stream = s;
    const v = document.getElementById("video"); v.srcObject = s; await v.play();
  } catch(e) {
    er.textContent = "ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้กล้อง";
    er.classList.add("on");
  }
}
function stopCam() { if (S.stream) { S.stream.getTracks().forEach(t => t.stop()); S.stream = null; } }

function snap() {
  const v = document.getElementById("video"), c = document.getElementById("cap-canvas");
  c.width = 520; c.height = 390;
  const ctx = c.getContext("2d");
  const vw = v.videoWidth, vh = v.videoHeight, r = 520/390, vr = vw/vh;
  let sx=0,sy=0,sw=vw,sh=vh;
  if (vr > r) { sw = vh*r; sx = (vw-sw)/2; } else { sh = vw/r; sy = (vh-sh)/2; }
  ctx.save(); ctx.translate(520,0); ctx.scale(-1,1);
  ctx.drawImage(v, sx,sy,sw,sh, 0,0,520,390);
  ctx.restore();
  return c.toDataURL("image/jpeg", .92);
}

/* ═══════════ COUNTDOWN ═══════════ */
function doCountdown() {
  const btn = document.getElementById("shutter"); btn.style.display = "none";
  const ol = document.getElementById("cd-layer"), nm = document.getElementById("cd-num");
  ol.classList.add("on");
  let ct = 3; nm.textContent = ct; reA(nm, "countPulse .9s ease-out");
  const ti = setInterval(() => {
    ct--;
    if (ct > 0) { nm.textContent = ct; reA(nm, "countPulse .9s ease-out"); }
    else {
      clearInterval(ti); ol.classList.remove("on");
      const fl = document.getElementById("fl-layer");
      fl.classList.add("on"); reA(fl, "flashBang .35s ease-out forwards");
      setTimeout(() => fl.classList.remove("on"), 350);
      S.pics.push(snap()); updCam();
      if (S.pics.length >= 3) setTimeout(() => { stopCam(); goReview(); }, 700);
      else setTimeout(() => { btn.style.display = "flex"; doCountdown(); }, 1200);
    }
  }, 1000);
}
function reA(el, v) { el.style.animation = "none"; void el.offsetWidth; el.style.animation = v; }

function updCam() {
  const n = S.pics.length;
  document.getElementById("shot-label").textContent = "📸 ถ่ายรูปที่ " + Math.min(n+1,3) + " / 3";
  const dr = document.getElementById("dot-row"); dr.innerHTML = "";
  for (let i=0;i<3;i++) { const d = document.createElement("div"); d.className = "dot " + (i<n?"done":i===n?"current":"pending"); dr.appendChild(d); }
  const tr = document.getElementById("thumb-row"); tr.innerHTML = "";
  S.pics.forEach((p,i) => { const d = document.createElement("div"); d.className = "thumb"; d.innerHTML = `<img src="${p}">`; tr.appendChild(d); });
  for (let i=n;i<3;i++) { const d = document.createElement("div"); d.className = "thumb-empty"; d.textContent = i+1; tr.appendChild(d); }
  document.getElementById("shutter").style.display = n<3 ? "flex" : "none";
}

/* ═══════════ COMPOSE STRIP ═══════════ */
function goReview() {
  document.getElementById("rv-load").style.display = "block";
  document.getElementById("rv-result").style.display = "none";
  go("review"); setTimeout(compose, 300);
}

async function compose() {
  const t = S.tpl;
  const cv = document.createElement("canvas");
  cv.width = FW; cv.height = FH;
  const ctx = cv.getContext("2d");

  // 1. White background
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(0, 0, FW, FH);

  // 2. Draw photos into slots
  for (let i = 0; i < 3; i++) {
    const slot = t.slots[i];
    if (!S.pics[i]) continue;
    const img = new Image();
    img.src = S.pics[i];
    await new Promise(r => { img.onload = r; img.onerror = r; });
    // Crop-to-fit
    const sr = slot.w / slot.h, ir = img.width / img.height;
    let sx=0,sy=0,sw=img.width,sh=img.height;
    if (ir > sr) { sw = sh*sr; sx = (img.width-sw)/2; }
    else { sh = sw/sr; sy = (img.height-sh)/2; }
    ctx.drawImage(img, sx,sy,sw,sh, slot.x,slot.y,slot.w,slot.h);
  }

  // 3. Frame overlay on top
  if (t.imgObj) {
    ctx.drawImage(t.imgObj, 0, 0, FW, FH);
  } else {
    const fi = new Image(); fi.crossOrigin = "anonymous"; fi.src = t.src;
    await new Promise(r => { fi.onload = r; fi.onerror = r; });
    if (fi.complete && fi.naturalWidth > 0) ctx.drawImage(fi, 0, 0, FW, FH);
  }

  S.comp = cv.toDataURL("image/png");

  // Show result
  document.getElementById("rv-load").style.display = "none";
  const r = document.getElementById("rv-result"); r.style.display = "block";
  reA(r, "postcardFlip 1s ease-out");
  document.getElementById("strip-box").innerHTML = `<img src="${S.comp}">`;

  // Upload
  uploadToDrive();
}

/* ═══════════ UPLOAD TO GOOGLE DRIVE ═══════════ */
async function uploadToDrive() {
  const area = document.getElementById("qr-status");
  driveUrl = null;

  area.innerHTML = `
    <div style="font-size:36px;margin-bottom:8px;animation:spin 1.2s linear infinite">⏳</div>
    <p style="color:rgba(255,255,255,.85);font-size:13px">กำลังอัปโหลดรูปไป Google Drive...</p>`;

  try {
    const fileName = 'Aloha-Party-' + Date.now() + '.png';
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ image: S.comp, fileName: fileName })
    });

    const result = await resp.json();

    if (result.success) {
      driveUrl = result.directUrl;
      area.innerHTML = `
        <div style="background:linear-gradient(135deg,#4CAF50,#2E7D32);color:#FFF;padding:8px 16px;border-radius:10px;font-size:14px;font-weight:700;margin-bottom:14px;display:inline-block">✅ อัปโหลดสำเร็จ!</div>
        <p style="color:rgba(255,255,255,.8);font-size:13px;margin-bottom:12px">📱 สแกน QR เพื่อเปิดรูปในมือถือ</p>
        <div class="qr-wrapper" id="qr-code"></div>
        <p style="color:rgba(255,255,255,.5);font-size:11px;margin-top:10px">กดค้างที่รูป → Save Image</p>
        <a href="${result.viewUrl}" target="_blank" rel="noopener" style="display:inline-block;margin-top:10px;padding:8px 20px;background:var(--gold);color:#5D4037;border-radius:20px;font-size:13px;font-weight:700;text-decoration:none">🔗 เปิดใน Google Drive</a>`;
      const qr = document.getElementById("qr-code");
      if (qr) new QRCode(qr, { text:result.directUrl, width:160, height:160, colorDark:"#000", colorLight:"#fff", correctLevel:QRCode.CorrectLevel.M });
    } else {
      throw new Error(result.error || 'Upload failed');
    }
  } catch(err) {
    console.error('Upload error:', err);
    area.innerHTML = `
      <div style="background:rgba(255,70,70,.2);border:1px solid rgba(255,100,100,.4);border-radius:12px;padding:14px;margin-bottom:14px">
        <p style="color:#FF8A80;font-size:13px;font-weight:700;margin-bottom:4px">⚠️ อัปโหลดไม่สำเร็จ</p>
        <p style="color:rgba(255,255,255,.6);font-size:11px">${err.message}</p>
      </div>
      <p style="color:rgba(255,255,255,.7);font-size:13px;margin-bottom:12px">กดปุ่มด้านล่างเพื่อเปิดรูปเต็มจอ แล้วกดค้าง Save</p>
      <button onclick="openImageTab()" style="padding:10px 24px;background:var(--gold);color:#5D4037;border:none;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif">🖼️ เปิดรูปเต็มจอ</button>
      <br><button onclick="uploadToDrive()" style="margin-top:10px;padding:8px 20px;background:transparent;border:1px solid rgba(255,255,255,.3);color:#FFF;border-radius:20px;font-size:12px;cursor:pointer;font-family:'Sarabun',sans-serif">🔄 ลองอัปโหลดอีกครั้ง</button>`;
  }
}

/* ═══════════ SHARE / DOWNLOAD / HELPERS ═══════════ */
function openImageTab() {
  if (!S.comp) return;
  const w = window.open('');
  if (w) w.document.write(`<html><head><title>Aloha Photo Strip</title><meta name="viewport" content="width=device-width,initial-scale=1"></head><body style="margin:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="${S.comp}" style="max-width:100%;max-height:100vh"></body></html>`);
}

function dlStrip() {
  if (!S.comp) return;
  const a = document.createElement("a"); a.href = S.comp; a.download = "aloha-photobooth.png"; a.click();
}

async function shareStrip() {
  if (!S.comp) return;
  try {
    const blob = await (await fetch(S.comp)).blob();
    const file = new File([blob], 'aloha-photobooth.png', { type:'image/png' });
    if (navigator.canShare && navigator.canShare({ files:[file] })) {
      await navigator.share({ title:'Aloha Thank You Party 🌺', text:'Photo Strip จากงาน Aloha Thank You Party!', files:[file] });
    } else {
      openImageTab();
    }
  } catch(e) {
    if (e.name !== 'AbortError') openImageTab();
  }
}

function resetAll() {
  stopCam(); driveUrl = null; S = { tpl:null, pics:[], stream:null, comp:null }; go("start");
}
